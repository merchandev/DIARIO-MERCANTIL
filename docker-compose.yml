services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: dashboard-backend
    restart: always
    volumes:
      - ./backend/storage:/var/www/html/storage
    # No ports exposed to host, only internal network
    environment:
      APP_ENV: production
      DB_PATH: /var/www/html/storage/database.sqlite
      UPLOAD_DIR: /var/www/html/storage/uploads
      RESULT_DIR: /var/www/html/storage/results

    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: dashboard-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80" # Map host port 8080 to container Nginx port 80
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
